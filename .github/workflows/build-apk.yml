name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Android SDK
        run: |
          $ANDROID_HOME/tools/bin/sdkmanager --install 'build-tools;35.0.0' 'platforms;android-35' 2>&1 | tail -3 || true
          $ANDROID_HOME/tools/bin/sdkmanager --licenses 2>&1 | tail -3 || true

      - name: Install dependencies
        run: npm install 2>&1

      - name: Sync Capacitor
        run: npx cap sync android 2>&1

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK (full output)
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace 2>&1

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freeapp-apk
          path: |
            **/*.apk