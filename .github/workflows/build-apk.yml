name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Android SDK
        run: |
          echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --install 'build-tools;35.0.0' 'platforms;android-35' 2>&1 | tail -3
          echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --licenses 2>&1 | tail -3 || true

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android && ./gradlew assembleDebug

      - name: Locate APK
        if: always()
        run: |
          echo "=== outputs dir ==="
          ls -la android/app/build/outputs/ 2>/dev/null || echo "no outputs dir"
          ls -la android/app/build/outputs/apk/ 2>/dev/null || echo "no apk dir"
          ls -laR android/app/build/outputs/apk/debug/ 2>/dev/null || echo "no debug dir"
          echo "=== search apk ==="
          find android -name "*.apk" -type f 2>/dev/null || echo "not found in android"
          find . -name "*.apk" -type f 2>/dev/null || echo "not found in ."

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freeapp-apk
          path: |
            **/*.apk