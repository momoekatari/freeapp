name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Accept Android SDK License
        run: yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Find and Upload APK
        if: always()
        run: |
          echo "Searching for APK files..."
          find android -name "*.apk" -type f 2>/dev/null || echo "No APK files found in android/"
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found anywhere"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freeapp-apk
          path: |
            **/*.apk